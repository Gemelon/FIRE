---
ConfigurationVersion: 1.21

# ---------------------------------------------------------------------------
# Logging (optional section)
#
# Remove or comment out the entire Logging block to disable logging.
#
# LogFilePath   – Directory where log files are written.
#                 Default: <DataBasePath>/Logs when omitted.
# LogFileName   – Base name without extension.
#                 Default: FireLog when omitted.
# LogLevel      – Minimum severity to record.
#                 Values: Debug | Info | Warning | Error | Critical
#                 Default: Error when omitted.
# MaxFileSizeBytes – Rotate to a new segment file when this size is reached.
#                 Recommended range: 1 MB–50 MB.  Default: 10485760 (10 MB).
# MaxAgeDays    – Log files older than this many days are deleted on each run.
#                 Set to 0 to keep all files.  Default: 30.
# ---------------------------------------------------------------------------
Logging:
  LogFilePath: D:\Projekte\Projekte_2026\TestDataTarget\Logs
  LogFileName: FireLog
  LogLevel: Info
  MaxFileSizeBytes: 10485760   # 10 MB
  MaxAgeDays: 30

FilesRootPath: 
  - D:\Projekte\Projekte_2026\TestData\Neuer Ordner (3)
  - D:\Projekte\Projekte_2026\TestData\Samsung SM-F766B
  - D:\Projekte\Projekte_2026\TestData\Samsung SM-S938B
  - D:\Projekte\Projekte_2026\TestData\Samsung SM-X520
DataBasePath: D:\Projekte\Projekte_2026\TestDataTarget
DataBaseFileName: FiReDatabase.db

Action: Copy
MediaRootPath: D:\Projekte\Projekte_2026\TestDataTarget\Media Test
RootPath: "{MediaRootPath}"
SortingPatern: "{MediaRootPath}\\{MetaCreationTime.Year}\\{MetaCreationTime.Month}\\{MetaCreationTime.Day}\\{Make}\\{Model}"
FileNamePatern: "{MetaCreationTime.Year}-{MetaCreationTime.Month}-{MetaCreationTime.Day}_{Counter:D3}"

StringReplacements:
  SM-G985F: SM-G985F Galaxy S20
  SM-S938B: SM-S938B Galaxy S25 Ultra
  SM-F766B: SM-F766B Galaxy Z Flip7
  SM-A528B: SM-A528B Galaxy A52s
  Galaxy Z Flip7: SM-F766B Galaxy Z Flip7
  Galaxy S25 Ultra: SM-S938B Galaxy S25 Ultra

Sorting: 
- MetaCreationTime.Year
- MetaCreationTime.Month
- MetaCreationTime.Day
- MetaCreationTime.Hour
- MetaCreationTime.Minute
- MetaCreationTime.Second
SortingOrder: Ascending

FileExtensions:
  .jpg:
    FileType: Image 
    FileClass: RegularFile
    Action: Copy 
    RootPath: "{MediaRootPath}"
    SortingPatern: "{MediaRootPath}\\{MetaCreationTime.Year}\\{MetaCreationTime.Month}\\{MetaCreationTime.Day}\\{Make}\\{Model}"
    FileNamePatern: "{MetaCreationTime.Year}-{MetaCreationTime.Month}-{MetaCreationTime.Day}_{Counter:D3}.JPG"
    AvailableKeyWords:
      Make:
        DataType: STRING
        Source: EXIFTOOL
        KeyWords:
        - exififd:make
        - "DJI:Make"
        - "IFD0:Make"
      Model:
        DataType: STRING
        Source: EXIFTOOL
        KeyWords:
        - IFD0:Model
        - IFD0:UniqueCameraModel
      MetaCreationTime:
        DataType: DATETIME
        Source: EXIFTOOL
        ValAttribute: LOWEST
        KeyWords:
        - Composite:DateTimeCreated
        - Composite:SubSecCreateDate
        - ExifIFD:CreateDate
        - IPTC:DateCreated
        - IPTC:TimeCreated
        - XMP-photoshop:DateCreated
        - XMP-xmp:CreateDate
  .png:
    FileType: Image
    FileClass: RegularFile
    Action: Copy
    RootPath: "{MediaRootPath}"
    SortingPatern: "{MediaRootPath}\\{MetaCreationTime.Year}\\{MetaCreationTime.Month}\\{MetaCreationTime.Day}\\{Make}\\{Model}"
    FileNamePatern: "{MetaCreationTime.Year}-{MetaCreationTime.Month}-{MetaCreationTime.Day}_{Counter:D3}.PNG"
    SidecarFileExtensions:
    - .xmp
    AvailableKeyWords:
      Make:
        DataType: STRING
        Source: EXIFTOOL
        KeyWords:
        - exififd:make
        - "DJI:Make"
        - "IFD0:Make"
      Model:
        DataType: STRING
        Source: EXIFTOOL
        KeyWords:
        - IFD0:Model
        - IFD0:UniqueCameraModel
      MetaCreationTime:
        DataType: DATETIME
        Source: EXIFTOOL
        ValAttribute: LOWEST
        KeyWords:
        - Composite:DateTimeCreated
        - Composite:SubSecCreateDate
        - ExifIFD:CreateDate
        - IPTC:DateCreated
        - IPTC:TimeCreated
        - XMP-photoshop:DateCreated
        - XMP-xmp:CreateDate
  .dng:
    FileType: Image # TODO: Enum for FileType and FileClass
    FileClass: RegularFile
    Action: Copy # todo: Enum for Action Move, Copy, Link
    RootPath: "{MediaRootPath}"
    SortingPatern: "{MediaRootPath}\\{MetaCreationTime.Year}\\{MetaCreationTime.Month}\\{MetaCreationTime.Day}\\{Make}\\{Model}"
    FileNamePatern: "{MetaCreationTime.Year}-{MetaCreationTime.Month}-{MetaCreationTime.Day}_{Counter:D3}.DNG"
    SidecarFileExtensions:
    - .xmp
    AvailableKeyWords:
      Make:
        DataType: STRING
        Source: EXIFTOOL
        KeyWords:
        - exififd:make
        - "DJI:Make"
        - "IFD0:Make"
      Model:
        DataType: STRING
        Source: EXIFTOOL
        KeyWords:
        - IFD0:Model
        - IFD0:UniqueCameraModel
      MetaCreationTime:
        DataType: DATETIME
        Source: EXIFTOOL
        ValAttribute: LOWEST
        KeyWords:
        - Composite:DateTimeCreated
        - Composite:SubSecCreateDate
        - ExifIFD:CreateDate
        - IPTC:DateCreated
        - IPTC:TimeCreated
        - XMP-photoshop:DateCreated
        - XMP-xmp:CreateDate
  .arw:
    FileType: Image # TODO: Enum for FileType and FileClass
    FileClass: RegularFile
    Action: Copy # todo: Enum for Action Move, Copy, Link
    RootPath: "{MediaRootPath}"
    SortingPatern: "{MediaRootPath}\\{MetaCreationTime.Year}\\{MetaCreationTime.Month}\\{MetaCreationTime.Day}\\{Make}\\{Model}"
    FileNamePatern: "{MetaCreationTime.Year}-{MetaCreationTime.Month}-{MetaCreationTime.Day}_{Counter:D3}.ARW"
    SidecarFileExtensions:
    - .xmp
    AvailableKeyWords:
      Make:
        DataType: STRING
